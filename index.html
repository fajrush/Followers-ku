<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Panel Followers Pribadi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; text-align: center; padding-top: 50px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 12px; display: inline-block; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input { display: block; width: 280px; padding: 12px; margin: 15px auto; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 6px; }
        button { padding: 12px 25px; background: #e1306c; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #c13584; }
        #status { margin-top: 15px; font-weight: bold; color: #00f2fe; }
    </style>
</head>
<body>

    <div class="container">
        <h2>IG Follower Injector (Pribadi)</h2>
        <p style="font-size: 13px; color: #aaa;">Gak perlu input password tumbal di sini. Cukup login sekali langsung di browsernya.</p>
        
        <input type="text" id="target" placeholder="Username Target (Akun Utama Lu)">
        <button onclick="tembakFollower()">Jalankan Bot Follow</button>
        
        <div id="status"></div>
    </div>

    <script>
        async function tembakFollower() {
            const status = document.getElementById('status');
            const target = document.getElementById('target').value;
            
            if(!target) return alert("Isi dulu username targetnya, bro!");

            status.innerText = "Bot sedang membuka browser...";

            const response = await fetch('/api/follow-target', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetFollow: target })
            });

            const data = await response.json();
            status.innerText = data.message;
        }
    </script>
</body>
</html>
